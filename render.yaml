services:
  - type: web
    name: ai-video-summary
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: "streamlit run app.py --server.port $PORT --server.enableCORS false --server.headless true"
    envVars:
      # Set these in Render Dashboard → Environment → Add variables
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
      # Add other keys if needed
    autoDeploy: true
